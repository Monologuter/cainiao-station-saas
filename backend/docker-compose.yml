name: cainiao-station

services:
  postgres:
    image: postgres:16
    container_name: cainiao-station-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "15432:5432"
    volumes:
      - cainiao-pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7
    container_name: cainiao-station-redis
    ports:
      - "16379:6379"

volumes:
  cainiao-pgdata:
