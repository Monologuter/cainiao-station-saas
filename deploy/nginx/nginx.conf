# 菜鸟驿站 · Nginx 反代占位配置（profile: app）
# 接入层：静态托管三前端 + 反代 api / ai-service。
# 现为最小占位，前端构建产物与上游细化随应用编排落地时补全。

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;

  upstream cainiao_api {
    server api:3100;
  }

  upstream cainiao_ai {
    server ai-service:8000;
  }

  server {
    listen 80;
    server_name _;

    location /api/ {
      proxy_pass http://cainiao_api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /ai/ {
      proxy_pass http://cainiao_ai/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      return 200 "cainiao-station nginx placeholder\n";
      add_header Content-Type text/plain;
    }
  }
}
