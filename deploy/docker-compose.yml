# 菜鸟驿站 SaaS · 生产/单机部署编排（Docker Compose）
#
# 设计基线见 docs/superpowers/specs/设计方案-整合版.md §12。
# 编组统一归到独立 name: cainiao-station，容器名/卷/网络独立，宿主端口全部错开，
# 不占用本机 5432 / 6379 / 9000 / 3000。
#
# 分两类服务：
#   - 基础设施（postgres / redis / minio）：镜像现成，可直接 `docker compose up` 起。
#   - 应用编排（api / ai-service / nginx）：依赖各自 Dockerfile（尚未落地），
#     先归入 profile `app` 并以 build context 占位。默认 `up` 不会拉起它们，
#     待 Dockerfile 就绪后用 `--profile app` 启用，避免现在 build 失败。
#
# 校验：docker compose -f deploy/docker-compose.yml config -q

name: cainiao-station

services:
  # ---------- 基础设施（可直接 up） ----------
  postgres:
    image: postgres:16
    container_name: cainiao-station-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - cainiao-pgdata:/var/lib/postgresql/data
      - ../backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  redis:
    image: redis:7
    container_name: cainiao-station-redis
    ports:
      - "16379:6379"
    volumes:
      - cainiao-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  minio:
    image: minio/minio:latest
    container_name: cainiao-station-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cainiao}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cainiao-secret}
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # 控制台
    volumes:
      - cainiao-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  # ---------- 应用编排（profile: app，待 Dockerfile 就绪后启用） ----------
  api:
    build:
      context: ../backend
    image: cainiao-station/api:latest
    container_name: cainiao-station-api
    profiles: ["app"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cainiao}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cainiao-secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-cainiao-files}
      PORT: "3100"
    ports:
      - "13100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cainiao-net

  ai-service:
    build:
      context: ../ai-service
    image: cainiao-station/ai-service:latest
    container_name: cainiao-station-ai-service
    profiles: ["app"]
    environment:
      PORT: "8000"
    ports:
      - "18000:8000"
    networks:
      - cainiao-net

  nginx:
    image: nginx:1.27-alpine
    container_name: cainiao-station-nginx
    profiles: ["app"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:80"
    depends_on:
      - api
      - ai-service
    networks:
      - cainiao-net

volumes:
  cainiao-pgdata:
  cainiao-redisdata:
  cainiao-minio:

networks:
  cainiao-net:
    name: cainiao-station-net
