# 菜鸟驿站 SaaS · 生产/单机部署编排（Docker Compose）
#
# 设计基线见 docs/superpowers/specs/设计方案-整合版.md §12。
# 编组统一归到独立 name: cainiao-station，容器名/卷/网络独立，宿主端口全部错开，
# 不占用本机 5432 / 6379 / 9000 / 3000。
#
# 分两类服务：
#   - 基础设施（postgres / redis / minio）：镜像现成，可直接 `docker compose up` 起。
#   - 应用编排（api / ai-service / nginx）：依赖各自 Dockerfile（尚未落地），
#     先归入 profile `app` 并以 build context 占位。默认 `up` 不会拉起它们，
#     待 Dockerfile 就绪后用 `--profile app` 启用，避免现在 build 失败。
#
# 校验：docker compose -f deploy/docker-compose.yml config -q

name: cainiao-station

services:
  # ---------- 基础设施（可直接 up） ----------
  postgres:
    image: postgres:16
    container_name: cainiao-station-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "15432:5432"
    volumes:
      - cainiao-pgdata:/var/lib/postgresql/data
      - ../backend/docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  redis:
    image: redis:7
    container_name: cainiao-station-redis
    ports:
      - "16379:6379"
    volumes:
      - cainiao-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  minio:
    image: minio/minio:latest
    container_name: cainiao-station-minio
    command: server /data --console-address ":9001"
    environment:
      # SEC-13：生产必改。本机 dev 默认 cainiao/cainiao-secret，
      # 通过 .env 覆盖 MINIO_ROOT_USER / MINIO_ROOT_PASSWORD。
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cainiao}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CHANGE_ME_MINIO_PASSWORD}
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # 控制台
    volumes:
      - cainiao-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cainiao-net

  # ---------- 应用编排（profile: app，待 Dockerfile 就绪后启用） ----------
  api:
    build:
      context: ../backend
    image: cainiao-station/api:latest
    container_name: cainiao-station-api
    profiles: ["app"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/postgres?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cainiao}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-CHANGE_ME_MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET:-cainiao-files}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      # SEC-13：JWT 密钥与 AI 共享令牌必须在 .env 显式提供，缺失即拒绝启动。
      JWT_SECRET: ${JWT_SECRET:?required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?required}
      # 容器内走 service 名访问 ai-service（与 ai-service SERVICE_TOKEN 对齐）。
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:18080}
      OVERDUE_SCAN_CRON: ${OVERDUE_SCAN_CRON:-0 2 * * *}
      PORT: "3100"
    ports:
      - "13100:3100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # /api 全局前缀；ready 探针校验 postgres + redis 连通性。
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3100/api/health/ready',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - cainiao-net

  ai-service:
    build:
      context: ../ai-service
    image: cainiao-station/ai-service:latest
    container_name: cainiao-station-ai-service
    profiles: ["app"]
    environment:
      PORT: "8000"
      # 与 api 的 AI_SERVICE_TOKEN 共享同一值，做服务间鉴权（X-Service-Token）。
      SERVICE_TOKEN: ${AI_SERVICE_TOKEN:?required}
      OCR_PROVIDER: ${OCR_PROVIDER:-mock}
      AI_ASSISTANT_MODE: ${AI_ASSISTANT_MODE:-mock}
      AI_LLM_MODEL: ${AI_LLM_MODEL:-claude-opus-4-8}
      # 仅当 AI_ASSISTANT_MODE=real 时需要，mock 模式可留空。
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    ports:
      - "18000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/readyz').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - cainiao-net

  nginx:
    image: nginx:1.27-alpine
    container_name: cainiao-station-nginx
    profiles: ["app"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "18080:80"
    depends_on:
      api:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - cainiao-net

volumes:
  cainiao-pgdata:
  cainiao-redisdata:
  cainiao-minio:

networks:
  cainiao-net:
    name: cainiao-station-net
