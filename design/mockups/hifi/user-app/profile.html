<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>个人中心 · 驿小站</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== 内联 kit.css ===== */
:root{
  --bg:#F7F8FA;--surface:#FFFFFF;--surface-2:#FBFCFE;
  --side-bg:#FFFFFF;--side-fg:#334155;--side-mut:#94A3B8;--side-on-bg:#EBF1FE;--side-on-fg:#3B6EF6;--side-line:#EEF1F5;
  --text:#1E293B;--muted:#64748B;--border:#E8EBF0;--border-2:#F1F3F7;
  --primary:#3B6EF6;--primary-fg:#fff;--primary-soft:#EBF1FE;--primary-700:#2557E6;
  --accent:#10B981;--accent-soft:#E7F8F1;
  --ok:#16A34A;--ok-soft:#ECFDF3;--warn:#D97706;--warn-soft:#FEF3C7;--danger:#DC2626;--danger-soft:#FEF2F2;
  --info:#0EA5E9;--info-soft:#E0F2FE;--purple:#7C5CFC;--purple-soft:#EFEBFF;
  --radius:12px;--radius-sm:9px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 12px 32px rgba(16,24,40,.12);
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--font);background:var(--bg);color:var(--text);width:100%;font-size:14px;-webkit-font-smoothing:antialiased}
svg{stroke:currentColor;fill:none;stroke-width:2}
a{text-decoration:none;color:inherit}
.tnum{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.link{color:var(--primary);font-weight:600;cursor:pointer}
.btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 15px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.18s;white-space:nowrap}
.btn:hover{border-color:#D6DBE4;background:var(--surface-2)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-700);border-color:var(--primary-700)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px}
.tag.amber{background:var(--warn-soft);color:var(--warn)}

/* ===== 移动端外壳 ===== */
.phone{width:390px;min-height:844px;margin:0 auto;background:var(--bg);position:relative;display:flex;flex-direction:column;overflow:hidden}
/* 状态栏 */
.statusbar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;font-size:14px;font-weight:600;color:#fff;position:relative;z-index:3}
.statusbar .sb-r{display:flex;align-items:center;gap:6px}
.statusbar svg{width:16px;height:16px;stroke-width:2.2}
/* 标题栏 */
.navbar{height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;position:relative;z-index:3}
.navbar h1{font-size:17px;font-weight:700;color:#fff}
.navbar .nb-ic{width:34px;height:34px;display:grid;place-items:center;color:#fff;cursor:pointer}
.navbar .nb-ic svg{width:21px;height:21px}
/* 顶部主色渐变背景 */
.hero{background:linear-gradient(160deg,#4B7BF8 0%,#3B6EF6 45%,#2557E6 100%);padding-bottom:58px;position:relative}
.hero::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:60px;background:radial-gradient(120% 60px at 50% 0,rgba(255,255,255,.12),transparent 70%)}
/* 滚动主体 */
.scroll{flex:1;overflow-y:auto;padding:0 16px 92px}
/* 用户卡 */
.user-card{display:flex;align-items:center;gap:14px;padding:4px 4px 2px}
.avatar-lg{width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.18);border:1.5px solid rgba(255,255,255,.45);display:grid;place-items:center;color:#fff;flex-shrink:0;backdrop-filter:blur(4px)}
.avatar-lg svg{width:30px;height:30px;stroke-width:2}
.user-meta{flex:1;min-width:0}
.user-name{display:flex;align-items:center;gap:8px}
.user-name b{font-size:19px;font-weight:700;color:#fff}
.vip-badge{display:inline-flex;align-items:center;gap:4px;background:linear-gradient(135deg,#FFE3A3,#F6C667);color:#7A4B12;font-size:11px;font-weight:700;padding:2.5px 8px;border-radius:20px;box-shadow:0 2px 6px rgba(214,150,30,.3)}
.vip-badge svg{width:12px;height:12px;stroke-width:2.4}
.user-phone{font-size:12.5px;color:rgba(255,255,255,.82);margin-top:5px;display:flex;align-items:center;gap:5px}
.user-phone svg{width:13px;height:13px}
.nb-ic-edit{align-self:flex-start}
/* 积分条 */
.points{display:flex;align-items:center;justify-content:space-between;margin-top:16px;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.22);border-radius:var(--radius-lg);padding:13px 16px;backdrop-filter:blur(4px)}
.points-l{display:flex;align-items:center;gap:11px}
.points-l .pi{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.22);display:grid;place-items:center;color:#FFE3A3}
.points-l .pi svg{width:20px;height:20px}
.points-l .pt-num{font-size:21px;font-weight:700;color:#fff;line-height:1.1}
.points-l .pt-lab{font-size:11.5px;color:rgba(255,255,255,.8);margin-top:1px}
.points .btn-redeem{display:inline-flex;align-items:center;gap:4px;background:#fff;color:var(--primary);font-size:12.5px;font-weight:700;height:30px;padding:0 13px;border-radius:20px;cursor:pointer}
.points .btn-redeem svg{width:14px;height:14px;stroke-width:2.4}
/* 数据宫格 */
.grid-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);margin-top:-40px;position:relative;z-index:2;padding:18px 4px}
.grid-item{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;position:relative}
.grid-item+.grid-item::before{content:"";position:absolute;left:0;top:6px;bottom:6px;width:1px;background:var(--border-2)}
.grid-item .gn{font-size:21px;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
.grid-item .gl{font-size:12px;color:var(--muted)}
.grid-item.hot .gn{color:var(--primary)}
.grid-item .gdot{position:absolute;top:-2px;right:24px;min-width:16px;height:16px;padding:0 4px;border-radius:10px;background:var(--danger);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center}
/* 分组卡 */
.group-card{background:var(--surface);border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-top:14px;overflow:hidden}
.row{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer;transition:.16s;min-height:52px}
.row:hover{background:var(--surface-2)}
.row+.row{border-top:1px solid var(--border-2)}
.row .ri{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.row .ri svg{width:18px;height:18px;stroke-width:2}
.row .rt{flex:1;font-size:14.5px;font-weight:500;color:var(--text)}
.row .rsub{font-size:12px;color:var(--muted);font-weight:400}
.row .chev{color:#C2CAD6;display:grid;place-items:center}
.row .chev svg{width:18px;height:18px}
.row .rtag{font-size:11px;font-weight:600;color:var(--warn);background:var(--warn-soft);padding:2px 8px;border-radius:7px}
.i-blue{background:var(--primary-soft);color:var(--primary)}
.i-green{background:var(--ok-soft);color:var(--ok)}
.i-amber{background:var(--warn-soft);color:var(--warn)}
.i-purple{background:var(--purple-soft);color:var(--purple)}
.i-info{background:var(--info-soft);color:var(--info)}
.i-gray{background:#F1F5F9;color:#64748B}
.sec-cap{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.04em;padding:18px 6px 8px}
/* 底部 tabbar */
.tabbar{position:absolute;left:0;right:0;bottom:0;width:390px;height:64px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 8px 6px;z-index:5}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;color:var(--side-mut);padding-top:8px}
.tab svg{width:23px;height:23px;stroke-width:2}
.tab span{font-size:10.5px;font-weight:500}
.tab.on{color:var(--primary)}
.tab.on span{font-weight:700}
.home-ind{position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:128px;height:5px;border-radius:3px;background:#1E293B;opacity:.85;z-index:6}
</style>
</head>
