<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>驿小站 · 首页</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   菜鸟驿站 · 高保真共享 KIT（内联）
   =========================================================== */
:root{
  --bg:#F7F8FA;--surface:#FFFFFF;--surface-2:#FBFCFE;
  --side-bg:#FFFFFF;--side-fg:#334155;--side-mut:#94A3B8;--side-on-bg:#EBF1FE;--side-on-fg:#3B6EF6;--side-line:#EEF1F5;
  --text:#1E293B;--muted:#64748B;--border:#E8EBF0;--border-2:#F1F3F7;
  --primary:#3B6EF6;--primary-fg:#fff;--primary-soft:#EBF1FE;--primary-700:#2557E6;
  --accent:#10B981;--accent-soft:#E7F8F1;
  --ok:#16A34A;--ok-soft:#ECFDF3;--warn:#D97706;--warn-soft:#FEF3C7;--danger:#DC2626;--danger-soft:#FEF2F2;
  --info:#0EA5E9;--info-soft:#E0F2FE;--purple:#7C5CFC;--purple-soft:#EFEBFF;
  --radius:12px;--radius-sm:9px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 12px 32px rgba(16,24,40,.12);
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh}
body{font-family:var(--font);background:#E9ECF1;color:var(--text);width:100%;font-size:14px;-webkit-font-smoothing:antialiased}
svg{stroke:currentColor;fill:none;stroke-width:2}
a{text-decoration:none;color:inherit}
.tnum{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.link{color:var(--primary);font-weight:600;cursor:pointer}
/* 按钮 */
.btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 15px;border-radius:var(--radius-sm);font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.18s;white-space:nowrap}
.btn:hover{border-color:#D6DBE4;background:var(--surface-2)}
.btn svg{width:16px;height:16px}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-700);border-color:var(--primary-700)}
.btn-sm{height:30px;padding:0 11px;font-size:12.5px}
/* 标签 */
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px}
.tag .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.tag.blue{background:var(--primary-soft);color:var(--primary)}
.tag.green{background:var(--ok-soft);color:var(--ok)}
.tag.amber{background:var(--warn-soft);color:var(--warn)}
.tag.gray{background:#F1F5F9;color:#64748B}

/* ===========================================================
   移动端竖屏外壳（uni-app 微信小程序 · 390x844）
   =========================================================== */
.phone{width:390px;min-height:844px;margin:0 auto;background:var(--bg);position:relative;display:flex;flex-direction:column;
  box-shadow:0 20px 60px rgba(16,24,40,.18);overflow:hidden}
/* 顶部主色区（状态栏+标题栏渐变背景） */
.head{background:linear-gradient(135deg,#4F7BFF 0%,#3B6EF6 55%,#2557E6 100%);color:#fff;padding-bottom:2px}
/* 状态栏 44px */
.statusbar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:15px;font-weight:600;letter-spacing:.02em}
.statusbar .sys{display:flex;align-items:center;gap:6px}
.statusbar .sys svg{width:17px;height:11px;stroke:#fff}
.statusbar .batt{display:flex;align-items:center;gap:3px;font-size:11px;font-weight:600}
/* 标题栏 */
.titlebar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.loc{display:flex;align-items:center;gap:7px;cursor:pointer}
.loc .pin{width:18px;height:18px;stroke:#fff}
.loc b{font-size:16px;font-weight:700}
.loc .chev{width:16px;height:16px;stroke:#fff;opacity:.85}
.bell{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.16);display:grid;place-items:center;cursor:pointer;position:relative}
.bell svg{width:20px;height:20px;stroke:#fff}
.bell .dot{position:absolute;top:9px;right:10px;width:8px;height:8px;border-radius:50%;background:#FF5252;border:1.5px solid #4061E0}

/* 滚动内容区 */
.body{flex:1;padding:0 16px 18px;margin-top:-2px;overflow:auto}

/* 醒目大卡（待取） */
.hero{margin-top:14px;background:linear-gradient(135deg,#4F7BFF 0%,#3B6EF6 60%,#2D5BEA 100%);border-radius:var(--radius-lg);
  padding:18px 18px;color:#fff;display:flex;align-items:center;gap:14px;cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 10px 24px rgba(59,110,246,.34)}
.hero::after{content:"";position:absolute;right:-30px;top:-30px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.10)}
.hero::before{content:"";position:absolute;right:36px;bottom:-46px;width:96px;height:96px;border-radius:50%;background:rgba(255,255,255,.07)}
.hero .ico{width:50px;height:50px;border-radius:14px;background:rgba(255,255,255,.20);display:grid;place-items:center;flex-shrink:0;position:relative}
.hero .ico svg{width:26px;height:26px;stroke:#fff}
.hero .txt{flex:1;min-width:0;position:relative}
.hero .txt .t{font-size:18px;font-weight:700;display:flex;align-items:baseline;gap:6px}
.hero .txt .t b{font-size:26px;line-height:1;font-variant-numeric:tabular-nums}
.hero .txt .s{font-size:12.5px;opacity:.9;margin-top:5px}
.hero .arrow{width:24px;height:24px;stroke:#fff;flex-shrink:0;position:relative}

/* 快捷四宫格 */
.quick{margin-top:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow);display:grid;grid-template-columns:repeat(4,1fr);padding:16px 6px}
.qi{display:flex;flex-direction:column;align-items:center;gap:8px;padding:4px 2px;cursor:pointer}
.qi .qc{width:48px;height:48px;border-radius:14px;display:grid;place-items:center}
.qi .qc svg{width:23px;height:23px}
.qi span{font-size:12px;font-weight:600;color:var(--text)}
.qc.c1{background:var(--primary-soft);color:var(--primary)}
.qc.c2{background:var(--accent-soft);color:var(--accent)}
.qc.c3{background:var(--info-soft);color:var(--info)}
.qc.c4{background:var(--purple-soft);color:var(--purple)}

/* 区块标题 */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin:20px 2px 12px}
.sec-hd h2{font-size:16px;font-weight:700}
.sec-hd h2 .cnt{color:var(--primary);font-variant-numeric:tabular-nums}
.sec-hd .more{font-size:12.5px;color:var(--muted);font-weight:500;display:flex;align-items:center;gap:2px;cursor:pointer}
.sec-hd .more svg{width:14px;height:14px}

/* 包裹卡 */
.parcel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);
  padding:15px 16px;margin-bottom:12px}
.parcel .pl-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.parcel .pcode{font-size:13px;color:var(--muted);font-weight:500}
.parcel .pcode b{display:block;font-size:25px;font-weight:800;color:var(--primary);letter-spacing:.04em;margin-top:3px;font-variant-numeric:tabular-nums}
.parcel .meta{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.parcel .row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text)}
.parcel .row svg{width:15px;height:15px;stroke:var(--muted);flex-shrink:0}
.parcel .row .k{color:var(--muted);min-width:auto}
.parcel .row b{font-weight:700}
.parcel .pl-bot{display:flex;align-items:center;justify-content:space-between;margin-top:13px;padding-top:13px;border-top:1px solid var(--border-2)}
.parcel .pl-bot .time{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.parcel .pl-bot .time svg{width:14px;height:14px;stroke:var(--muted)}
.loc-chip{display:inline-flex;align-items:center;gap:5px;background:var(--warn-soft);color:var(--warn);font-size:12px;font-weight:700;
  padding:4px 9px;border-radius:8px;font-variant-numeric:tabular-nums}
.loc-chip svg{width:13px;height:13px}

/* 会员积分横幅 */
.points{margin-top:6px;background:linear-gradient(120deg,#FFF7E8 0%,#FFFBF2 100%);border:1px solid #F4E4C2;
  border-radius:var(--radius-lg);padding:15px 16px;display:flex;align-items:center;gap:13px;cursor:pointer;box-shadow:var(--shadow)}
.points .pc{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,#FFC34D,#F59E0B);display:grid;place-items:center;flex-shrink:0}
.points .pc svg{width:24px;height:24px;stroke:#fff}
.points .pt{flex:1;min-width:0}
.points .pt .l{font-size:13px;color:#92681E;font-weight:600}
.points .pt .v{font-size:21px;font-weight:800;color:#B45309;font-variant-numeric:tabular-nums;margin-top:2px}
.points .pt .v small{font-size:12px;font-weight:600}
.points .go{background:linear-gradient(135deg,#F59E0B,#D97706);color:#fff;border:none;height:34px;padding:0 16px;border-radius:20px;
  font-size:13px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:5px;flex-shrink:0}
.points .go svg{width:14px;height:14px;stroke:#fff}

/* 底部 tabbar 56px */
.tabbar{height:56px;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:stretch;
  flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--muted)}
.tab svg{width:23px;height:23px}
.tab span{font-size:11px;font-weight:600}
.tab.on{color:var(--primary)}
</style>
</head>
<body>
<div class="phone">

  <!-- 顶部主色区 -->

      <div class="time">9:41</div>
