<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1">
<title>物流追踪 · 驿小站</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===========================================================
   菜鸟驿站 · 高保真共享 KIT（清爽蓝主题 · 内联）
   =========================================================== */
:root{
  --bg:#F7F8FA;--surface:#FFFFFF;--surface-2:#FBFCFE;
  --side-bg:#FFFFFF;--side-fg:#334155;--side-mut:#94A3B8;--side-on-bg:#EBF1FE;--side-on-fg:#3B6EF6;--side-line:#EEF1F5;
  --text:#1E293B;--muted:#64748B;--border:#E8EBF0;--border-2:#F1F3F7;
  --primary:#3B6EF6;--primary-fg:#fff;--primary-soft:#EBF1FE;--primary-700:#2557E6;
  --accent:#10B981;--accent-soft:#E7F8F1;
  --ok:#16A34A;--ok-soft:#ECFDF3;--warn:#D97706;--warn-soft:#FEF3C7;--danger:#DC2626;--danger-soft:#FEF2F2;
  --info:#0EA5E9;--info-soft:#E0F2FE;--purple:#7C5CFC;--purple-soft:#EFEBFF;
  --radius:12px;--radius-sm:9px;--radius-lg:16px;
  --shadow:0 1px 3px rgba(16,24,40,.06),0 1px 2px rgba(16,24,40,.04);
  --shadow-lg:0 12px 32px rgba(16,24,40,.12);
  --font:'Inter','PingFang SC','Microsoft YaHei',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
svg{stroke:currentColor;fill:none;stroke-width:2}
a{text-decoration:none;color:inherit}
.tnum{font-variant-numeric:tabular-nums}
.muted{color:var(--muted)}
.tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:7px}
.tag .d{width:6px;height:6px;border-radius:50%;background:currentColor}
.tag.blue{background:var(--primary-soft);color:var(--primary)}
.tag.green{background:var(--ok-soft);color:var(--ok)}
.tag.red{background:var(--danger-soft);color:var(--danger)}
.tag.amber{background:var(--warn-soft);color:var(--warn)}
.tag.gray{background:#F1F5F9;color:#64748B}
.tag.purple{background:var(--purple-soft);color:var(--purple)}

/* ---------- 移动端外壳 ---------- */
body{font-family:var(--font);background:#E9EDF3;color:var(--text);-webkit-font-smoothing:antialiased}
.phone{width:390px;min-height:844px;margin:0 auto;background:var(--bg);position:relative;display:flex;flex-direction:column;overflow:hidden}

/* 状态栏 */
.statusbar{height:44px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:0 22px;background:var(--surface);font-weight:600;font-size:14px}
.statusbar .sb-r{display:flex;align-items:center;gap:6px}
.statusbar .sb-r svg{width:16px;height:16px;color:var(--text)}

/* 标题栏 */
.navbar{height:50px;flex-shrink:0;display:flex;align-items:center;padding:0 14px;background:var(--surface);border-bottom:1px solid var(--border-2);gap:6px}
.navbar .back{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--text)}
.navbar .back:hover{background:var(--surface-2)}
.navbar .back svg{width:22px;height:22px}
.navbar h1{font-size:17px;font-weight:600;letter-spacing:-.01em}
.navbar .nb-r{margin-left:auto;width:36px;height:36px;border-radius:50%;display:grid;place-items:center;cursor:pointer;color:var(--muted)}
.navbar .nb-r:hover{background:var(--surface-2)}
.navbar .nb-r svg{width:20px;height:20px}

/* 滚动内容区 */
.scroll{flex:1;overflow-y:auto;padding:16px 16px 28px}

/* ---------- 运单卡 ---------- */
.ship-card{background:linear-gradient(135deg,#3B6EF6 0%,#2557E6 100%);border-radius:var(--radius-lg);padding:18px;color:#fff;box-shadow:0 10px 24px rgba(59,110,246,.28);position:relative;overflow:hidden}
.ship-card::after{content:"";position:absolute;right:-30px;top:-30px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,.08)}
.ship-card .row1{display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
.ship-card .carrier{display:flex;align-items:center;gap:10px}
.ship-card .carrier .ico{width:40px;height:40px;border-radius:11px;background:rgba(255,255,255,.18);display:grid;place-items:center;cursor:pointer}
.ship-card .carrier .ico svg{width:21px;height:21px;color:#fff}
.ship-card .carrier b{font-size:15px;font-weight:600;display:block}
.ship-card .carrier .no{font-size:12px;color:rgba(255,255,255,.8);font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px;margin-top:2px;cursor:pointer}
.ship-card .carrier .no svg{width:13px;height:13px;color:rgba(255,255,255,.8)}
.ship-card .st-tag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:8px;background:rgba(255,255,255,.2);color:#fff;backdrop-filter:blur(4px)}
.ship-card .st-tag .d{width:6px;height:6px;border-radius:50%;background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,.3);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.ship-card .recv{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.16);display:flex;align-items:center;gap:9px;position:relative;z-index:1}
.ship-card .recv svg{width:16px;height:16px;color:rgba(255,255,255,.85);flex-shrink:0}
.ship-card .recv .txt{font-size:12.5px;color:rgba(255,255,255,.92);line-height:1.5}
.ship-card .recv .txt b{font-weight:600;color:#fff}

/* ---------- 时间线卡 ---------- */
.tl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow);margin-top:16px;overflow:hidden}
.tl-card .hd{display:flex;align-items:center;gap:8px;padding:15px 18px 13px}
.tl-card .hd svg{width:17px;height:17px;color:var(--primary)}
.tl-card .hd h2{font-size:14.5px;font-weight:600}
.tl-card .hd .cnt{margin-left:auto;font-size:11.5px;color:var(--muted);font-weight:500}

.timeline{padding:4px 18px 18px}
.node{display:flex;gap:14px;position:relative}
/* 竖线：连接到下一个节点 */
.node::before{content:"";position:absolute;left:8px;top:20px;bottom:-6px;width:2px;background:var(--border);transform:translateX(-50%)}
.node:last-child::before{display:none}
.node .dot-wrap{flex-shrink:0;width:18px;display:flex;justify-content:center;padding-top:3px}
.node .dot{width:12px;height:12px;border-radius:50%;background:#fff;border:2.5px solid var(--border);box-sizing:border-box}
.node .body{flex:1;padding-bottom:22px;min-width:0}
.node:last-child .body{padding-bottom:2px}
.node .nd-st{font-size:13.5px;font-weight:600;color:var(--muted);line-height:1.3}
.node .nd-desc{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5}
.node .nd-time{font-size:11.5px;color:#94A3B8;margin-top:5px;font-variant-numeric:tabular-nums;display:flex;align-items:center;gap:5px}
.node .nd-time svg{width:12px;height:12px;color:#A7AFBC}

/* 当前/最新节点高亮 */
.node.current::before{background:linear-gradient(180deg,var(--primary),var(--border))}
.node.current .dot{width:16px;height:16px;border:none;background:var(--primary);box-shadow:0 0 0 4px var(--primary-soft);margin-top:-1px}
.node.current .nd-st{color:var(--primary);font-weight:700;font-size:14px}
.node.current .nd-desc{color:var(--text);font-weight:500}
.node.current .nd-time svg{color:var(--primary)}

/* 取件码高亮块 */
.pickup{margin-top:11px;background:var(--primary-soft);border:1px solid #D6E2FD;border-radius:var(--radius-sm);padding:11px 13px;display:flex;align-items:center;gap:11px;cursor:pointer}
.pickup .pk-ico{width:34px;height:34px;border-radius:9px;background:var(--primary);color:#fff;display:grid;place-items:center;flex-shrink:0}
.pickup .pk-ico svg{width:18px;height:18px;color:#fff}
.pickup .pk-info .lab{font-size:11px;color:var(--primary);font-weight:600}
.pickup .pk-info .code{font-size:19px;font-weight:700;color:var(--primary-700);letter-spacing:.04em;font-variant-numeric:tabular-nums;margin-top:1px}
.pickup .pk-arrow{margin-left:auto;color:var(--primary)}
.pickup .pk-arrow svg{width:18px;height:18px}

/* 底部动作 */
.actions{padding:14px 16px calc(14px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border-2);display:flex;gap:11px;flex-shrink:0}
.actions .btn{flex:1;height:46px;border-radius:var(--radius);font-size:14.5px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);transition:.18s}
.actions .btn svg{width:18px;height:18px}
.actions .btn:hover{background:var(--surface-2);border-color:#D6DBE4}
.actions .btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.actions .btn-primary:hover{background:var(--primary-700);border-color:var(--primary-700)}
</style>
</head>
<body>
<div class="phone">

  <!-- 状态栏 -->
  <div class="statusbar">
    <span class="tnum">9:41</span>
    <div class="sb-r">
      <svg viewBox="0 0 24 24"><path d="M5 13a10 10 0 0 1 14 0"/><path d="M8.5 16.5a5 5 0 0 1 7 0"/><path d="M2 8.82a15 15 0 0 1 20 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
